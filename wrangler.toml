name = "signbridge-gloss"
main = "workers/gloss/index.js"
compatibility_date = "2026-06-16"

[vars]
GROQ_MODEL = "llama-3.1-8b-instant"
# Talk/listen gloss (POST /): Gemini chain — primary 2.5-flash, then failover models
GEMINI_MODEL = "gemini-2.5-flash"
GEMINI_FALLBACK_MODEL = "gemini-2.5-flash"
GEMINI_PRIMARY_TIMEOUT_MS = "15000"
# Sign video (/sign): gemini-3.5-flash via Adesso AI Hub (GEMINI_KEY = fallback)
SIGN_GEMINI_MODEL = "gemini-3.5-flash"
ADESSO_MODEL = "qwen-3.6-35b-sovereign"
# Sign-assets worker — gloss → stitch single MP4
SIGN_ASSETS_URL = "https://signbridge-sign-assets.signbridge-adesso.workers.dev"
