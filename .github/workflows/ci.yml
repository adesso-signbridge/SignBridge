name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coding-standards:
    name: Coding standards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Verify pubspec.lock is up to date
        run: |
          flutter pub get
          git diff --exit-code pubspec.lock

  architecture:
    name: Architecture checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coding-standards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run architecture guardrails
        run: flutter test test/architecture/

  validation:
    name: Repository validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coding-standards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run repository validation tests
        run: flutter test test/validation/

      - name: Block tracked secret files and IDE artifacts
        run: |
          set -euo pipefail
          forbidden='^(\.env|\.env\.|credentials\.json|\.cursor/|\.venv|\.venv_pdf/)'
          if git ls-files | grep -E "$forbidden"; then
            echo "Forbidden tracked files detected."
            exit 1
          fi

      - name: Scan for hardcoded secret patterns
        run: |
          set -euo pipefail
          pattern='(ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |OPENSSH )?PRIVATE KEY-----)'
          if git grep -I -n -E "$pattern" -- . ':(exclude)*.md'; then
            echo "Potential secret detected in source."
            exit 1
          fi
          echo "No secret patterns found."

  release-readiness:
    name: Release readiness (iOS + Android)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coding-standards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Apple HIG and store packaging checks
        run: flutter test test/release/ --exclude-tags store-blocker

      - name: Report store submission blockers
        continue-on-error: true
        run: |
          flutter test test/release/ --tags store-blocker || \
            echo "::warning::Store submission blockers remain (bundle ID, release signing). See test output."

  test:
    name: Unit and widget tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coding-standards
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage --exclude-tags store-blocker

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  build:
    name: Build verification (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [architecture, validation, release-readiness, test]
    strategy:
      fail-fast: false
      matrix:
        target: [apk, appbundle, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.target == 'apk'
        run: flutter build apk --debug

      - name: Build Android App Bundle
        if: matrix.target == 'appbundle'
        run: flutter build appbundle

      - name: Build Web
        if: matrix.target == 'web'
        run: flutter build web

  ios-release:
    # Manual only — not part of the PR merge gate. Run from Actions → CI → Run workflow.
    if: github.event_name == 'workflow_dispatch'
    name: iOS TestFlight build check
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [architecture, validation, release-readiness, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without codesigning
        run: flutter build ios --release --no-codesign

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v5

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

  merge-gate:
    name: PR merge gate
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - coding-standards
      - architecture
      - validation
      - release-readiness
      - test
      - build
      - dependency-review
      - workflow-lint
    steps:
      - name: Require 6 core CI checks before merge
        env:
          CODING_STANDARDS: ${{ needs.coding-standards.result }}
          ARCHITECTURE: ${{ needs.architecture.result }}
          VALIDATION: ${{ needs.validation.result }}
          RELEASE_READINESS: ${{ needs.release-readiness.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
        run: |
          set -euo pipefail

          record() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name ($result)"
              FAILURES+=("$name ($result)")
            fi
          }

          PASSED=0
          FAILURES=()

          # Six checks required to unblock merge (configure in branch protection).
          record "Coding standards" "$CODING_STANDARDS"
          record "Architecture checks" "$ARCHITECTURE"
          record "Repository validation" "$VALIDATION"
          record "Release readiness (iOS + Android)" "$RELEASE_READINESS"
          record "Unit and widget tests" "$TEST"
          record "Build verification (apk, appbundle, web)" "$BUILD"

          echo ""
          echo "Core checks passed: $PASSED / 6"

          # Advisory on pull requests (not part of the required six).
          if [ "$DEPENDENCY_REVIEW" != "success" ]; then
            echo "::warning::Dependency review did not pass ($DEPENDENCY_REVIEW)"
          fi
          if [ "$WORKFLOW_LINT" != "success" ]; then
            echo "::warning::Workflow lint did not pass ($WORKFLOW_LINT)"
          fi

          if [ "$PASSED" -lt 6 ]; then
            echo "::error::PR merge blocked: ${#FAILURES[@]} required check(s) failed."
            printf ' - %s\n' "${FAILURES[@]}"
            exit 1
          fi

          echo "All 6 required CI checks passed. This PR is eligible to merge once branch protection is enabled."

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    needs:
      - coding-standards
      - architecture
      - validation
      - release-readiness
      - test
      - build
      - workflow-lint
    steps:
      - name: Evaluate required checks
        run: |
          check() {
            result="$1"
            name="$2"
            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              echo "PASS: $name ($result)"
            else
              echo "FAIL: $name ($result)"
              exit 1
            fi
          }

          check "${{ needs.coding-standards.result }}" "Coding standards"
          check "${{ needs.architecture.result }}" "Architecture checks"
          check "${{ needs.validation.result }}" "Repository validation"
          check "${{ needs.release-readiness.result }}" "Release readiness"
          check "${{ needs.test.result }}" "Unit and widget tests"
          check "${{ needs.build.result }}" "Build verification"
          check "${{ needs.workflow-lint.result }}" "Workflow lint"

      - name: CI passed
        if: success()
        run: echo "All required CI checks passed."
