name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coding-standards:
    name: Coding standards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze project source
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Verify pubspec.lock is up to date
        run: |
          flutter pub get
          git diff --exit-code pubspec.lock

  architecture:
    name: Architecture checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run architecture guardrails
        run: flutter test test/architecture/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit and widget tests
        run: flutter test --exclude-tags store-blocker

      - name: Run golden path tests
        run: |
          flutter test --tags golden-path
          flutter test test/widget_test.dart --name "Tap listen"

  android-build:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --debug

  ios-checks:
    name: iOS checks
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint iOS Swift sources
        working-directory: ios
        run: swiftlint lint --config .swiftlint.yml --strict

      - name: Build iOS app without codesigning
        run: flutter build ios --debug --no-codesign

  merge-gate:
    name: PR merge gate
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - coding-standards
      - architecture
      - tests
      - android-build
      - ios-checks
    steps:
      - name: Require all CI checks before merge
        env:
          CODING_STANDARDS: ${{ needs.coding-standards.result }}
          ARCHITECTURE: ${{ needs.architecture.result }}
          TESTS: ${{ needs.tests.result }}
          ANDROID_BUILD: ${{ needs.android-build.result }}
          IOS_CHECKS: ${{ needs.ios-checks.result }}
        run: |
          set -euo pipefail

          record() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              echo "PASS: $name"
              PASSED=$((PASSED + 1))
            else
              echo "FAIL: $name ($result)"
              FAILURES+=("$name ($result)")
            fi
          }

          PASSED=0
          FAILURES=()

          record "Coding standards" "$CODING_STANDARDS"
          record "Architecture checks" "$ARCHITECTURE"
          record "Tests" "$TESTS"
          record "Build Android" "$ANDROID_BUILD"
          record "iOS checks" "$IOS_CHECKS"

          echo ""
          echo "Checks passed: $PASSED / 5"

          if [ "$PASSED" -lt 5 ]; then
            echo "::error::PR merge blocked: ${#FAILURES[@]} required check(s) failed."
            printf ' - %s\n' "${FAILURES[@]}"
            exit 1
          fi

          echo "All required CI checks passed."
